name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          # Map-submit token baked into the static build (matches MAP_SUBMIT_TOKEN
          # on wtd-analytics). Falls back to the in-code default if the secret is unset.
          NEXT_PUBLIC_WTD_SUBMIT_TOKEN: ${{ secrets.NEXT_PUBLIC_WTD_SUBMIT_TOKEN }}
          # Optional override for the wtd-analytics base URL.
          NEXT_PUBLIC_WTD_ANALYTICS_BASE: ${{ secrets.NEXT_PUBLIC_WTD_ANALYTICS_BASE }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
